services:
  - type: web
    name: soil-smart-backend
    env: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: MODEL_SERVICE_URL
        sync: false
      - key: DISEASE_MODEL_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false