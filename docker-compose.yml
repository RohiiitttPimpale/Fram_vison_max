version: '3.8'

services:
  # Model Service - Dedicated ML Inference
  model-service:
    build:
      context: ./model-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - MODEL_PATH=/app/model/yield_model.joblib
    volumes:
      - ./server/model:/app/model:ro
    networks:
      - soil-smart
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Backend API - Request Orchestration
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///soil_smart_pilot.db
      - JWT_SECRET_KEY=dev-jwt-secret
      - MODEL_SERVICE_URL=http://model-service:5001
    depends_on:
      model-service:
        condition: service_healthy
    networks:
      - soil-smart
    volumes:
      - ./server:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Frontend - React SPA
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - soil-smart
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  soil-smart:
    driver: bridge
